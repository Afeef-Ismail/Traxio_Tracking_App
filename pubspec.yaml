name: traxio
description: Traxio — Vehicle Motion Data Collection & Driver Benchmarking

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Sensor access
  sensors_plus: ^4.0.2

  # GPS / Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Local Database
  sqflite_sqlcipher: ^3.1.0+1
  path_provider: ^2.1.2
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.66.2

  # Math / FFT
  scidart: ^0.0.2-dev.7

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Settings persistence
  shared_preferences: ^2.2.2

  # Fonts
  google_fonts: ^6.1.0

  # Security / Hashing
  crypto: ^3.0.3

  # Device info
  device_info_plus: ^10.1.2

  # HTTP
  http: ^1.2.1

  # File sharing / opening
  share_plus: ^10.0.2
  open_file: ^3.3.2
  wakelock_plus: ^1.1.5

  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - .env
